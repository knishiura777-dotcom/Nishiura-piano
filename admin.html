<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピアノ教室 予約管理システム</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        #root:empty { display: flex; align-items: center; justify-content: center; height: 100vh; background: #f8fafc; }
        #root:empty::after { content: "システムを起動中..."; color: #64748b; font-weight: bold; }
        .cell-transition { transition: all 0.15s ease; }
        .selected-cell { outline: 3px solid #6366f1; outline-offset: -3px; background-color: #eef2ff !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans text-sm">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const getEnvConfig = () => {
            try {
                const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                return {
                    config: (config && Object.keys(config).length > 0) ? config : null,
                    appId: typeof __app_id !== 'undefined' ? __app_id : 'piano-id-res-v1',
                    token: typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null
                };
            } catch (e) {
                return { config: null, appId: 'piano-id-res-v1', token: null };
            }
        };

        const env = getEnvConfig();
        const STORAGE_CONFIG_KEY = "piano_id_fb_config";
        const STORAGE_LOGIN_KEY = "piano_id_current_auth";

        const Icon = ({ name, className = "" }) => {
            const paths = {
                'login': <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"/>,
                'logout': <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>,
                'calendar': <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>,
                'chevron-left': <path d="m15 18-6-6 6-6" />,
                'chevron-right': <path d="m9 18 6-6-6-6" />,
                'check': <path d="M20 6 9 17l-5-5" />,
                'x': <path d="M18 6 6 18M6 6l12 12" />,
                'settings': <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>,
                'plus': <path d="M12 5v14M5 12h14" />,
                'eye': <><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></>,
                'key': <path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4"/>,
                'trash': <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/>,
                'layers': <path d="M12 2 2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>,
                'refresh': <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8m0 0V3m0 5h-5m-9 7a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16m0 0v5m0-5h-5"/>,
                'bug': <><path d="m8 2 1.88 1.88"/><path d="M14.12 3.88 16 2"/><path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/><path d="M12 20c-3.31 0-6-2.69-6-6v-1h12v1c0 3.31-2.69 6-6 6Z"/><path d="M12 10.13V20"/><path d="M18 13.13h3"/><path d="M18 17.13h2.5"/><path d="M6 13.13H3"/><path d="M6 17.13H3.5"/><path d="m18.13 10.13 2.5-2.5"/><path d="m5.88 10.13-2.5-2.5"/></>,
                'alert-triangle': <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></>,
                'info': <><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [fbConfig, setFbConfig] = useState(() => {
                const saved = localStorage.getItem(STORAGE_CONFIG_KEY);
                try {
                    const parsed = saved ? JSON.parse(saved) : null;
                    return (parsed && parsed.apiKey) ? parsed : env.config;
                } catch(e) { return env.config; }
            });

            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [user, setUser] = useState(null);
            const [schoolInfo, setSchoolInfo] = useState(() => {
                const saved = localStorage.getItem(STORAGE_LOGIN_KEY);
                try {
                    return saved ? JSON.parse(saved) : null;
                } catch(e) { return null; }
            });

            const [authMode, setAuthMode] = useState('login'); 
            const [loginForm, setLoginForm] = useState({ id: '', password: '', schoolName: '' });
            const [loginError, setLoginError] = useState('');
            const [reservations, setReservations] = useState({});
            const [currentDate, setCurrentDate] = useState(new Date());
            const [isSaving, setIsSaving] = useState(false);
            const [showAdminGuide, setShowAdminGuide] = useState(false);
            const [showDebug, setShowDebug] = useState(false);
            const [isLocalFile, setIsLocalFile] = useState(window.location.protocol === 'file:');

            const [isBulkMode, setIsBulkMode] = useState(false);
            const [selectedSlots, setSelectedSlots] = useState(new Set());

            // Firebase初期化
            useEffect(() => {
                if (!fbConfig || !fbConfig.apiKey || !window.firebase) return;
                try {
                    const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(fbConfig);
                    const _auth = firebase.auth();
                    const _db = firebase.firestore();
                    setAuth(_auth);
                    setDb(_db);

                    const initAuth = async () => {
                        try {
                            if (env.token) {
                                await _auth.signInWithCustomToken(env.token);
                            } else {
                                await _auth.signInAnonymously();
                            }
                        } catch (e) { 
                            console.error("Initial Auth Error:", e);
                        }
                    };
                    initAuth();
                    return _auth.onAuthStateChanged(u => {
                        console.log("Auth State Changed:", u ? u.uid : "null");
                        setUser(u);
                    });
                } catch (e) { 
                    console.error("Firebase init error:", e);
                }
            }, [fbConfig]);

            // データのリアルタイム同期
            useEffect(() => {
                if (!db || !user || !schoolInfo) return;
                
                const path = `artifacts/${env.appId}/public/data/schools/${schoolInfo.id}/reservations`;
                console.log("Subscribing to path:", path);
                
                const unsubscribe = db.collection(path).onSnapshot((snapshot) => {
                    const data = {};
                    snapshot.forEach(doc => { data[doc.id] = doc.data(); });
                    setReservations(data);
                    setLoginError(''); 
                }, (err) => {
                    console.error("Firestore Subscribe Error:", err);
                    if (err.code === 'permission-denied') {
                        setLoginError("権限エラー：データベースへの読み取りが拒否されました。ルールを確認してください。");
                    }
                });
                return () => unsubscribe();
            }, [db, user, schoolInfo]);

            const timeSlots = useMemo(() => {
                const slots = [];
                for (let h = 9; h <= 20; h++) {
                    slots.push(`${h.toString().padStart(2, '0')}:00`, `${h.toString().padStart(2, '0')}:30`);
                }
                return slots;
            }, []);

            const days = useMemo(() => {
                const d = [];
                const start = new Date(currentDate);
                start.setHours(0,0,0,0);
                for (let i = 0; i < 7; i++) {
                    const date = new Date(start);
                    date.setDate(start.getDate() + i);
                    d.push(date);
                }
                return d;
            }, [currentDate]);

            // フォーム送信
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!db || !auth) {
                    setLoginError("Firebaseが正しく初期化されていません。");
                    return;
                }
                
                setLoginError('');
                setIsSaving(true);

                try {
                    // 確実に匿名認証が完了していることを保証する
                    let activeUser = auth.currentUser;
                    if (!activeUser) {
                        console.log("Auth missing on submit, signing in...");
                        const result = await auth.signInAnonymously();
                        activeUser = result.user;
                        setUser(activeUser);
                    }

                    const id = loginForm.id.trim().toLowerCase();
                    const path = `artifacts/${env.appId}/public/data/schools/${id}`;
                    console.log("Accessing Path:", path);
                    
                    const schoolDocRef = db.doc(path);
                    const doc = await schoolDocRef.get();
                    
                    if (authMode === 'register') {
                        if (doc.exists) {
                            setLoginError('この教室IDは既に使用されています。');
                        } else {
                            // 新規登録時の書き込み
                            const newInfo = { id, name: loginForm.schoolName || id, password: loginForm.password };
                            await schoolDocRef.set(newInfo);
                            console.log("Registration Successful");
                            const finalInfo = { id: newInfo.id, name: newInfo.name, isGuest: false };
                            setSchoolInfo(finalInfo);
                            localStorage.setItem(STORAGE_LOGIN_KEY, JSON.stringify(finalInfo));
                        }
                    } else if (authMode === 'login') {
                        if (!doc.exists) {
                            setLoginError('教室IDが見つかりません。「新規登録」から作成してください。');
                        } else if (doc.data().password !== loginForm.password) {
                            setLoginError('パスワードが正しくありません。');
                        } else {
                            const data = doc.data();
                            const finalInfo = { id: data.id, name: data.name, isGuest: false };
                            setSchoolInfo(finalInfo);
                            localStorage.setItem(STORAGE_LOGIN_KEY, JSON.stringify(finalInfo));
                        }
                    } else if (authMode === 'guest') {
                        if (!doc.exists) {
                            setLoginError('その教室IDは見つかりませんでした。');
                        } else {
                            const data = doc.data();
                            const finalInfo = { id: data.id, name: data.name, isGuest: true };
                            setSchoolInfo(finalInfo);
                        }
                    }
                } catch (err) {
                    console.error("Submission Error:", err);
                    if (err.code === 'permission-denied') {
                        setLoginError('アクセス拒否：Firebaseの「セキュリティルール」が正しく貼り付けられ「公開」されているか確認してください。');
                    } else {
                        setLoginError(`エラー: ${err.message}`);
                    }
                }
                setIsSaving(false);
            };

            const handleLogout = () => {
                setSchoolInfo(null);
                localStorage.removeItem(STORAGE_LOGIN_KEY);
                setReservations({});
                setIsBulkMode(false);
                setSelectedSlots(new Set());
            };

            const handleResetFirebaseConfig = () => {
                if (confirm("Firebaseの設定をリセットして初期設定画面に戻りますか？")) {
                    localStorage.removeItem(STORAGE_CONFIG_KEY);
                    localStorage.removeItem(STORAGE_LOGIN_KEY);
                    window.location.reload();
                }
            };

            const handleCellClick = async (dateStr, time) => {
                if (!db || !user || !schoolInfo || schoolInfo.isGuest) return;
                
                const key = `${dateStr}-${time}`;

                if (isBulkMode) {
                    const newSelected = new Set(selectedSlots);
                    if (newSelected.has(key)) {
                        newSelected.delete(key);
                    } else {
                        newSelected.add(key);
                    }
                    setSelectedSlots(newSelected);
                } else {
                    const current = reservations[key];
                    let nextStatus = 'available';
                    if (!current || current.status === 'available') nextStatus = 'busy';

                    const path = `artifacts/${env.appId}/public/data/schools/${schoolInfo.id}/reservations`;
                    try {
                        await db.collection(path).doc(key).set({
                            status: nextStatus,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } catch (e) { alert("更新権限がありません。ルールを確認してください。"); }
                }
            };

            const handleBulkAction = async (action) => {
                if (selectedSlots.size === 0 || !db || !schoolInfo) return;
                
                const confirmMsg = action === 'delete' 
                    ? `${selectedSlots.size}件の枠を一括解除しますか？` 
                    : `${selectedSlots.size}件の枠を一括ブロックしますか？`;
                
                if (!confirm(confirmMsg)) return;

                setIsSaving(true);
                const path = `artifacts/${env.appId}/public/data/schools/${schoolInfo.id}/reservations`;
                const batch = db.batch();

                selectedSlots.forEach(key => {
                    const docRef = db.collection(path).doc(key);
                    if (action === 'delete') {
                        batch.delete(docRef);
                    } else {
                        batch.set(docRef, {
                            status: 'busy',
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                });

                try {
                    await batch.commit();
                    setSelectedSlots(new Set());
                    setIsBulkMode(false);
                } catch (e) {
                    alert("一括操作に失敗しました。");
                }
                setIsSaving(false);
            };

            const moveWeek = (offset) => {
                const newDate = new Date(currentDate);
                newDate.setDate(currentDate.getDate() + (offset * 7));
                setCurrentDate(newDate);
                setSelectedSlots(new Set());
            };

            // --- UI 描画 ---
            if (!fbConfig || !fbConfig.apiKey) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100 text-sm">
                        <div className="bg-white p-8 md:p-12 rounded-3xl shadow-xl max-w-lg w-full text-center border border-indigo-50">
                            <h1 className="text-2xl font-black text-slate-800 mb-6 flex items-center justify-center gap-3"><Icon name="settings" className="w-6 h-6 text-indigo-500" /> Firebase 設定</h1>
                            <textarea className="w-full h-48 border-2 border-slate-100 rounded-2xl p-4 text-xs font-mono bg-white focus:border-indigo-400 outline-none shadow-inner" placeholder='{"apiKey": "AIza...", ...}' onChange={(e) => {
                                try {
                                    const val = e.target.value.trim();
                                    if (val.startsWith('{')) {
                                        const parsed = JSON.parse(val);
                                        if (parsed.apiKey) { localStorage.setItem(STORAGE_CONFIG_KEY, val); setFbConfig(parsed); }
                                    }
                                } catch(e) {}
                            }}></textarea>
                            <p className="text-[10px] text-slate-400 mt-6 italic">設定JSONを貼り付けてください。保存後は次回から不要です。</p>
                        </div>
                    </div>
                );
            }

            if (!schoolInfo) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 text-center text-sm">
                        <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl shadow-indigo-100 max-w-md w-full border border-slate-100 animate-in fade-in zoom-in duration-300">
                            
                            <div className="flex bg-slate-100 p-1 rounded-2xl mb-8">
                                <button onClick={() => { setAuthMode('login'); setLoginError(''); }} className={`flex-1 py-2 rounded-xl text-xs font-black transition-all ${authMode !== 'guest' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>管理者</button>
                                <button onClick={() => { setAuthMode('guest'); setLoginError(''); }} className={`flex-1 py-2 rounded-xl text-xs font-black transition-all ${authMode === 'guest' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>ゲスト</button>
                            </div>

                            <div className="flex flex-col items-center mb-8 text-sm">
                                <div className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg mb-4 text-white ${authMode === 'guest' ? 'bg-emerald-500 shadow-emerald-100' : (authMode === 'register' ? 'bg-indigo-400' : 'bg-indigo-600')}`}>
                                    <Icon name={authMode === 'guest' ? 'eye' : (authMode === 'register' ? 'plus' : 'key')} className="w-7 h-7" />
                                </div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tight text-center">
                                    {authMode === 'guest' ? '予約状況を閲覧' : '教室予約管理'}
                                </h1>
                            </div>
                            
                            <form onSubmit={handleSubmit} className="space-y-4 text-left">
                                <div>
                                    <label className="block text-[10px] font-black text-slate-400 uppercase ml-2 mb-1">教室ID</label>
                                    <input type="text" value={loginForm.id} onChange={(e) => setLoginForm({...loginForm, id: e.target.value})} className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 font-bold focus:border-indigo-500 outline-none" placeholder="shinjuku-piano" required />
                                </div>
                                {authMode === 'register' && (
                                    <div className="animate-in slide-in-from-top-2 duration-300">
                                        <label className="block text-[10px] font-black text-slate-400 uppercase ml-2 mb-1">教室名（表示用）</label>
                                        <input type="text" value={loginForm.schoolName} onChange={(e) => setLoginForm({...loginForm, schoolName: e.target.value})} className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 font-bold focus:border-indigo-500 outline-none" placeholder="新宿ピアノ教室" required />
                                    </div>
                                )}
                                {authMode !== 'guest' && (
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 uppercase ml-2 mb-1">パスワード</label>
                                        <input type="password" value={loginForm.password} onChange={(e) => setLoginForm({...loginForm, password: e.target.value})} className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 font-bold focus:border-indigo-500 outline-none tracking-widest" placeholder="••••••••" required />
                                    </div>
                                )}
                                {loginError && <div className="text-red-500 text-[10px] font-bold text-center px-4 py-2 bg-red-50 rounded-xl leading-relaxed border border-red-100 animate-shake">{loginError}</div>}
                                <button disabled={isSaving} className={`w-full py-5 rounded-2xl font-black text-white transition-all shadow-xl flex items-center justify-center gap-2 disabled:opacity-50 mt-4 ${authMode === 'guest' ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-slate-900 hover:bg-indigo-600'}`}>
                                    {authMode === 'guest' ? '閲覧を開始する' : (authMode === 'register' ? '登録して開始' : 'ログイン')} 
                                    <Icon name={authMode === 'guest' ? 'eye' : 'login'} className="w-4 h-4" />
                                </button>
                            </form>
                            
                            <div className="mt-8 pt-6 border-t border-slate-100 flex flex-col gap-4 items-center">
                                {authMode !== 'guest' ? (
                                    <button onClick={() => { setAuthMode(authMode === 'login' ? 'register' : 'login'); setLoginError(''); }} className="text-xs font-bold text-indigo-500 hover:text-indigo-700 transition-all">{authMode === 'login' ? '新しく教室を登録する' : '既にアカウントをお持ちの方（ログイン）'}</button>
                                ) : (
                                    <p className="text-[10px] text-slate-400 font-medium text-center px-4 leading-relaxed">ゲストは閲覧のみ可能です。</p>
                                )}
                                <div className="flex gap-4 mt-2">
                                    <button onClick={() => setShowAdminGuide(true)} className="text-[10px] text-slate-400 font-bold hover:text-indigo-500">設定ガイドを表示</button>
                                    <button onClick={() => setShowDebug(!showDebug)} className="text-[10px] text-slate-400 font-bold flex items-center gap-1 hover:text-orange-500"><Icon name="bug" className="w-3 h-3" /> デバッグ</button>
                                    <button onClick={handleResetFirebaseConfig} className="text-[10px] text-slate-400 font-bold hover:text-red-500 flex items-center gap-1"><Icon name="refresh" className="w-2.5 h-2.5" /> 設定リセット</button>
                                </div>
                                {showDebug && (
                                    <div className="w-full text-[9px] font-mono text-slate-400 bg-slate-50 p-3 rounded-xl text-left border border-dashed border-slate-200">
                                        <p>UID: {user ? user.uid : "未認証"}</p>
                                        <p>AppID: {env.appId}</p>
                                        <p className="mt-2 text-indigo-500">現在、Firestoreルールの適用が必要です。設定ガイドからルールをコピーし、Firebaseコンソールで「公開」してください。</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20 text-sm">
                    <header className={`bg-white border-b sticky top-0 z-40 backdrop-blur-md bg-white/80 shadow-sm ${schoolInfo.isGuest ? 'border-b-emerald-100' : ''}`}>
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className={`p-2 rounded-xl shadow-inner ${schoolInfo.isGuest ? 'bg-emerald-50 text-emerald-600' : 'bg-indigo-50 text-indigo-600'}`}><Icon name={schoolInfo.isGuest ? 'eye' : 'calendar'} className="w-5 h-5" /></div>
                                <div>
                                    <div className="flex items-center gap-2"><h2 className="text-sm font-black text-slate-800">{schoolInfo.name}</h2>{schoolInfo.isGuest && <span className="text-[8px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-black uppercase">Guest</span>}</div>
                                    <p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest">ID: {schoolInfo.id}</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                {!schoolInfo.isGuest && <button onClick={() => setShowAdminGuide(true)} className="p-2 text-slate-400 hover:text-indigo-600 transition-colors"><Icon name="settings" className="w-5 h-5" /></button>}
                                <button onClick={handleLogout} className="flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-red-50 hover:text-red-600 text-slate-600 rounded-xl text-xs font-bold transition-all group"><Icon name="logout" className="w-4 h-4 group-hover:-translate-x-1 transition-transform" /> 終了</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-6 space-y-6">
                        {!schoolInfo.isGuest && (
                            <div className="bg-white p-4 rounded-3xl border border-indigo-100 shadow-md flex flex-wrap items-center justify-between gap-4 animate-in slide-in-from-top-4 duration-300">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => { setIsBulkMode(!isBulkMode); setSelectedSlots(new Set()); }} className={`flex items-center gap-2 px-4 py-2 rounded-2xl text-xs font-black transition-all ${isBulkMode ? 'bg-indigo-600 text-white shadow-lg' : 'bg-indigo-50 text-indigo-600 border border-indigo-100'}`}>
                                        <Icon name="layers" className="w-4 h-4" /> 一括編集 {isBulkMode ? 'ON' : 'OFF'}
                                    </button>
                                    {isBulkMode && <span className="text-xs font-black text-indigo-500 animate-pulse">{selectedSlots.size} 件選択中</span>}
                                </div>
                                {isBulkMode && selectedSlots.size > 0 && (
                                    <div className="flex items-center gap-2 animate-in fade-in zoom-in duration-200">
                                        <button onClick={() => handleBulkAction('register')} className="flex items-center gap-1.5 px-4 py-2 bg-slate-800 text-white rounded-xl text-xs font-black hover:bg-black transition-all shadow-md"><Icon name="x" className="w-3.5 h-3.5" strokeWidth={3} /> 一括ブロック</button>
                                        <button onClick={() => handleBulkAction('delete')} className="flex items-center gap-1.5 px-4 py-2 bg-red-50 text-red-600 border border-red-100 rounded-xl text-xs font-black hover:bg-red-100 transition-all shadow-sm"><Icon name="trash" className="w-3.5 h-3.5" /> 一括解除</button>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 text-center">
                            <div className="flex items-center justify-center gap-2">
                                <button onClick={() => moveWeek(-1)} className="p-2 bg-white border rounded-xl hover:bg-slate-50 shadow-sm transition-colors"><Icon name="chevron-left" /></button>
                                <div className="bg-white border px-6 py-2 rounded-xl shadow-sm min-w-[180px]"><span className="text-lg font-black text-slate-700">{currentDate.getFullYear()}年{(currentDate.getMonth() + 1).toString().padStart(2, '0')}月</span></div>
                                <button onClick={() => moveWeek(1)} className="p-2 bg-white border rounded-xl hover:bg-slate-50 shadow-sm transition-colors"><Icon name="chevron-right" /></button>
                            </div>
                        </div>
                        
                        <div className="bg-white rounded-[2rem] border border-slate-100 shadow-xl overflow-hidden shadow-indigo-50/50">
                            <div className="overflow-x-auto custom-scrollbar">
                                <table className="w-full border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50/50">
                                            <th className="p-4 border-b border-r text-[10px] font-black text-slate-400 uppercase w-20 sticky left-0 bg-white z-20">Time</th>
                                            {days.map((date, i) => (
                                                <th key={i} className="p-4 border-b text-center min-w-[100px]"><div className="text-lg font-black text-slate-700 leading-none">{date.getDate()}</div><div className={`text-[10px] font-black uppercase mt-1 ${date.getDay() === 0 ? 'text-red-400' : date.getDay() === 6 ? 'text-indigo-400' : 'text-slate-400'}`}>{['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][date.getDay()]}</div></th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {timeSlots.map((time) => (
                                            <tr key={time} className="group">
                                                <td className="p-3 border-r border-b text-center text-xs font-bold text-slate-500 sticky left-0 bg-white z-10 group-hover:bg-slate-50">{time}</td>
                                                {days.map((date, i) => {
                                                    const dateStr = date.toISOString().split('T')[0];
                                                    const key = `${dateStr}-${time}`;
                                                    const data = reservations[key];
                                                    const status = data?.status || 'available';
                                                    const isAvailable = status === 'available';
                                                    const isSelected = selectedSlots.has(key);
                                                    return (
                                                        <td key={i} onClick={() => handleCellClick(dateStr, time)} className={`p-1 border-b border-r last:border-r-0 cell-transition ${schoolInfo.isGuest ? 'bg-white' : (isAvailable ? 'hover:bg-indigo-50 cursor-pointer' : 'bg-slate-50 hover:bg-slate-100 cursor-pointer')} ${isSelected ? 'selected-cell' : ''}`}>
                                                            <div className="flex items-center justify-center h-12">
                                                                {isAvailable ? <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${schoolInfo.isGuest ? 'border-emerald-50 text-emerald-200' : 'border-indigo-100 text-indigo-400 active:scale-90'} ${isSelected ? 'border-indigo-500 text-indigo-600 bg-white shadow-inner' : ''}`}><Icon name="check" className="w-4 h-4" /></div> : <Icon name="x" className={`w-5 h-5 transition-colors ${isSelected ? 'text-indigo-500' : 'text-slate-300'}`} />}
                                                            </div>
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    {showAdminGuide && <AdminGuide onClose={() => setShowAdminGuide(false)} appId={env.appId} />}
                    {isSaving && <LoadingOverlay />}
                </div>
            );
        };

        const AdminGuide = ({ onClose, appId }) => (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 text-left text-sm">
                <div className="bg-white rounded-[2rem] w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8 shadow-2xl relative border border-slate-200">
                    <button onClick={onClose} className="absolute top-6 right-6 p-2 hover:bg-slate-100 rounded-full transition-colors"><Icon name="x" className="w-6 h-6" /></button>
                    <h2 className="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3">データベース設定ガイド</h2>
                    <div className="space-y-6 text-slate-600 leading-relaxed">
                        <section className="bg-indigo-50 p-6 rounded-2xl border border-indigo-100 shadow-inner text-sm">
                            <h3 className="font-bold text-indigo-900 mb-4 font-black underline">権限エラー（Missing Permissions）を完全に消す方法</h3>
                            <ul className="list-disc ml-6 space-y-2">
                                <li><strong>匿名認証は「有効」</strong>になっています。</li>
                                <li><strong>下記の「セキュリティルール」をコピーし、Firebaseの Firestore > Rules に貼り付けて「公開 (Publish)」をクリックしてください。</strong></li>
                                <li>以前のルールを全て消して、下記のコードだけに上書きするのが最も確実です。</li>
                            </ul>
                        </section>
                        <section className="bg-slate-900 text-slate-300 p-6 rounded-2xl font-mono text-[11px] overflow-x-auto shadow-inner relative">
                            <pre className="select-all">
{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    // artifacts配下の全階層に対し、読み取りを誰でも許可、書き込みを認証済みユーザーに許可
    match /artifacts/{allPaths=**} {
      allow read: if true;
      allow write: if request.auth != null;
    }
  }
}`}
                            </pre>
                            <p className="mt-4 text-[10px] text-emerald-400 font-bold">// これでパスの階層問題を回避し、確実に動作します</p>
                        </section>
                    </div>
                </div>
            </div>
        );

        const LoadingOverlay = () => (
            <div className="fixed inset-0 bg-white/40 backdrop-blur-[2px] z-[300] flex items-center justify-center animate-in fade-in">
                <div className="flex flex-col items-center gap-4">
                    <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    <span className="text-sm font-black text-indigo-600 animate-pulse">同期中...</span>
                </div>
            </div>
        );

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
