<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>にしうらピアノ教室 予約状況</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #f8fafc; color: #0f172a; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    h1 { text-align: center; margin: 20px 0 8px; }
    .sub { text-align: center; color: #64748b; margin-bottom: 20px; }
    .panel { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    .nav { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
    .nav button { border: 1px solid #cbd5e1; background: white; border-radius: 10px; padding: 8px 14px; font-weight: bold; cursor: pointer; }
    .monthLabel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px 14px; font-weight: bold; min-width: 140px; text-align: center; }
    .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .badge { padding: 8px 12px; border-radius: 999px; font-weight: bold; font-size: 14px; }
    .availableBadge { background: #d1fae5; color: #065f46; }
    .reservedBadge { background: #ef4444; color: white; }
    .tableWrap { overflow-x: auto; background: white; border: 1px solid #e2e8f0; border-radius: 16px; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { border: 1px solid #e2e8f0; text-align: center; }
    th { background: #f8fafc; padding: 10px 6px; font-size: 14px; }
    td.time { background: white; font-weight: bold; color: #475569; width: 86px; padding: 10px 6px; }
    td.slot { padding: 6px; height: 54px; }
    .cell { border-radius: 12px; padding: 10px 6px; font-weight: bold; font-size: 13px; }
    .available { background: #d1fae5; color: #065f46; }
    .reserved { background: #ef4444; color: white; }
    .sun { color: #dc2626; }
    .sat { color: #2563eb; }
    .msg { color: #64748b; text-align: center; padding: 18px; }
    @media (max-width: 640px) {
      .wrap { padding: 8px; }
      h1 { font-size: 22px; }
      .panel { padding: 10px; }
      table { min-width: 600px; }
      th, td { font-size: 11px; }
      td.time { font-size: 11px; width: 60px; }
      .cell { font-size: 11px; padding: 6px 2px; }
      .monthLabel { font-size: 12px; min-width: 100px; }
      .nav button { font-size: 12px; padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎹 にしうらピアノ教室</h1>
    <div class="sub">今週の予約状況</div>

    <div class="panel">
      <div class="nav">
        <button id="prevWeek">前の週</button>
        <div class="monthLabel" id="monthLabel">-</div>
        <button id="nextWeek">次の週</button>
      </div>
      <div class="legend">
        <span class="badge availableBadge">予約可</span>
        <span class="badge reservedBadge">予約不可</span>
      </div>
    </div>

    <div class="tableWrap">
      <table>
        <thead>
          <tr id="headerRow">
            <th>時間</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" class="msg">読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBrw6A9eUGibQp-axUmNzeQ_s6ZGAegszE",
      authDomain: "pianolessonrs.firebaseapp.com",
      projectId: "pianolessonrs",
      storageBucket: "pianolessonrs.firebasestorage.app",
      messagingSenderId: "129319321995",
      appId: "1:129319321995:web:b21ad17f341aa9cd37f8e",
      measurementId: "G-XF3TSCB9K1"
    };

    const APP_ID = "piano-id-res-v1";
    const SCHOOL_ID = "nishiura-piano";
    const DAYS = ["日", "月", "火", "水", "木", "金", "土"];

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const monthLabel = document.getElementById("monthLabel");
    const headerRow = document.getElementById("headerRow");
    const tableBody = document.getElementById("tableBody");
    const prevWeekBtn = document.getElementById("prevWeek");
    const nextWeekBtn = document.getElementById("nextWeek");

    let currentStart = getStartOfWeek(new Date());
    let reservations = {};

    function getStartOfWeek(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - d.getDay());
      return d;
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function getWeekDates(start) {
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        dates.push(d);
      }
      return dates;
    }

    function getTimeSlots() {
      const slots = [];
      for (let h = 9; h <= 20; h++) {
        slots.push(`${String(h).padStart(2, "0")}:00`);
        slots.push(`${String(h).padStart(2, "0")}:30`);
      }
      return slots;
    }

    function render() {
      const weekDates = getWeekDates(currentStart);
      const timeSlots = getTimeSlots();

      monthLabel.textContent = `${weekDates[0].getFullYear()}年${weekDates[0].getMonth() + 1}月`;

      headerRow.innerHTML = `<th>時間</th>` + weekDates.map((date, index) => {
        const cls = index === 0 ? "sun" : index === 6 ? "sat" : "";
        return `<th><div>${date.getDate()}</div><div class="${cls}">${DAYS[date.getDay()]}</div></th>`;
      }).join("");

      tableBody.innerHTML = "";

      timeSlots.forEach((time) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td class="time">${time}</td>` + weekDates.map((date) => {
          const key = `${formatDate(date)}-${time}`;
          const data = reservations[key] || {};
          const isReserved = data.status === "busy" || data.status === "reserved";
          return `
            <td class="slot">
              <div class="cell ${isReserved ? "reserved" : "available"}">${isReserved ? "予約不可" : "予約可"}</div>
            </td>
          `;
        }).join("");
        tableBody.appendChild(tr);
      });
    }

    prevWeekBtn.addEventListener("click", () => {
      currentStart.setDate(currentStart.getDate() - 7);
      currentStart = new Date(currentStart);
      render();
    });

    nextWeekBtn.addEventListener("click", () => {
      currentStart.setDate(currentStart.getDate() + 7);
      currentStart = new Date(currentStart);
      render();
    });

    const path = `artifacts/${APP_ID}/public/data/schools/${SCHOOL_ID}/reservations`;
    const colRef = collection(db, path);

    onSnapshot(colRef, (snapshot) => {
      reservations = {};
      snapshot.forEach((doc) => {
        reservations[doc.id] = doc.data();
      });
      render();
    }, (error) => {
      console.error(error);
      tableBody.innerHTML = '<tr><td colspan="8" class="msg">データの読み込みに失敗しました（Firestoreルールを確認してください）</td></tr>';
    });
  </script>
</body>
</html>
