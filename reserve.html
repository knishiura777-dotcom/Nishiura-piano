<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>にしうらピアノ教室 予約状況</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    h1 { text-align: center; }
    .slot { padding: 12px; margin: 8px 0; border-radius: 10px; cursor: pointer; }
    .available { background: #d1fae5; color:#065f46; }
    .reserved { background: #ef4444; color:white; }
  </style>
</head>
<body>
  <h1>🎹 にしうらピアノ教室</h1>
  <h3>今週の空き状況</h3>
  <div id="list"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBrw6A9eUGibQp-axUmNzeQ_s6ZGAegszE",
      authDomain: "pianolessonrs.firebaseapp.com",
      projectId: "pianolessonrs",
      storageBucket: "pianolessonrs.firebasestorage.app",
      messagingSenderId: "129319321995",
      appId: "1:129319321995:web:b21ad17f341aa9cd37f8e",
      measurementId: "G-XF3TSCB9K1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const listEl = document.getElementById("list");

    const colRef = collection(db, "lessons");

    // ★ここにLINEのURLを入れてください
    const LINE_URL = "https://line.me/"; 

    onSnapshot(colRef, (snapshot) => {
      listEl.innerHTML = "";
      snapshot.forEach(doc => {
        const data = doc.data();
        const isReserved = data.status === "reserved";

        const div = document.createElement("div");
        div.className = "slot " + (isReserved ? "reserved" : "available");

        const text = `${data.date} ${data.time} ： ${isReserved ? "予約済み" : "空き"}`;
        div.textContent = text;

        // 空きのみクリック可能 → LINE予約
        if (!isReserved) {
          div.onclick = () => {
            const message = encodeURIComponent(`レッスン予約希望\n${data.date} ${data.time}`);
            window.open(`${LINE_URL}?text=${message}`, "_blank");
          };
        } else {
          div.style.cursor = "not-allowed";
        }

        listEl.appendChild(div);
      });
    });
  </script>
</body>
</html>
