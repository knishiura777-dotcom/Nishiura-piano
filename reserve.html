<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>にしうらピアノ教室 予約状況</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    h1 { text-align: center; }
    .slot { padding: 10px; margin: 6px 0; border-radius: 8px; }
    .available { background: #d4edda; }
    .reserved { background: #f8d7da; }
  </style>
</head>
<body>
  <h1>🎹 にしうらピアノ教室</h1>
  <h3>今週の空き状況</h3>
  <div id="list"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBrw6A9eUGibQp-axUmNzeQ_s6ZGAegszE",
      authDomain: "pianolessonrs.firebaseapp.com",
      projectId: "pianolessonrs",
      storageBucket: "pianolessonrs.firebasestorage.app",
      messagingSenderId: "129319321995",
      appId: "1:129319321995:web:b21ad17f341aa9cd37f8e",
      measurementId: "G-XF3TSCB9K1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const listEl = document.getElementById("list");

    const colRef = collection(db, "lessons");

    onSnapshot(colRef, (snapshot) => {
      listEl.innerHTML = "";
      snapshot.forEach(doc => {
        const data = doc.data();
        const div = document.createElement("div");
        div.className = "slot " + (data.status === "reserved" ? "reserved" : "available");
        div.textContent = `${data.date} ${data.time} ： ${data.status === "reserved" ? "予約済み" : "空き"}`;
        listEl.appendChild(div);
      });
    });
  </script>
</body>
</html>
