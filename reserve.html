<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>にしうらピアノ教室 予約状況</title>
  <style>
    body { font-family: sans-serif; padding: 16px; background:#f8fafc; }
    h1 { text-align: center; margin-bottom: 10px; }
    h3 { margin-bottom: 20px; }
    .slot { padding: 12px; margin: 8px 0; border-radius: 10px; font-weight: bold; }
    .available { background: #d1fae5; color:#065f46; }
    .reserved { background: #ef4444; color:white; }
  </style>
</head>
<body>
  <h1>🎹 にしうらピアノ教室</h1>
  <h3>今週の空き状況</h3>
  <div id="list">読み込み中...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBrw6A9eUGibQp-axUmNzeQ_s6ZGAegszE",
      authDomain: "pianolessonrs.firebaseapp.com",
      projectId: "pianolessonrs",
      storageBucket: "pianolessonrs.firebasestorage.app",
      messagingSenderId: "129319321995",
      appId: "1:129319321995:web:b21ad17f341aa9cd37f8e",
      measurementId: "G-XF3TSCB9K1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const listEl = document.getElementById("list");

    // ★重要：admin.htmlと同じ構造
    const APP_ID = "piano-id-res-v1";
    const SCHOOL_ID = "nishiura-piano";

    const path = `artifacts/${APP_ID}/public/data/schools/${SCHOOL_ID}/reservations`;

    const colRef = collection(db, path);

    onSnapshot(colRef, (snapshot) => {
      listEl.innerHTML = "";

      if (snapshot.empty) {
        listEl.innerHTML = "（予約データがまだありません）";
        return;
      }

      snapshot.forEach(doc => {
        const data = doc.data();
        const isReserved = data.status === "busy" || data.status === "reserved";

        const div = document.createElement("div");
        div.className = "slot " + (isReserved ? "reserved" : "available");
        div.textContent = `${data.date || ""} ${data.time || ""} ： ${isReserved ? "予約済み" : "空き"}`;

        listEl.appendChild(div);
      });
    }, (error) => {
      console.error(error);
      listEl.innerHTML = "データの読み込みに失敗しました（Firestore設定またはルールを確認）";
    });
  </script>
</body>
</html>
