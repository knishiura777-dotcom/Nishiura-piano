<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>にしうらピアノ教室 予約状況</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
    #root:empty {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
    }
    #root:empty::after { content: "予約状況を読み込み中..."; font-weight: 700; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const STORAGE_CONFIG_KEY = "piano_id_fb_config";
    const DEFAULT_SCHOOL_ID = "nishiura-piano";
    const DEFAULT_SCHOOL_NAME = "にしうらピアノ教室";
    const APP_ID_FALLBACK = "piano-id-res-v1";

    const getEnvConfig = () => {
      try {
        const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        return {
          config: (config && Object.keys(config).length > 0) ? config : null,
          appId: typeof __app_id !== 'undefined' ? __app_id : APP_ID_FALLBACK,
          token: typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null,
        };
      } catch (e) {
        return { config: null, appId: APP_ID_FALLBACK, token: null };
      }
    };

    const env = getEnvConfig();
    const params = new URLSearchParams(window.location.search);
    const schoolId = (params.get('school') || DEFAULT_SCHOOL_ID).trim().toLowerCase();
    const schoolNameFromUrl = params.get('name');

    const Icon = ({ children, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const formatYmd = (date) => date.toISOString().split('T')[0];

    function App() {
      const [fbConfig, setFbConfig] = useState(() => {
        const saved = localStorage.getItem(STORAGE_CONFIG_KEY);
        try {
          const parsed = saved ? JSON.parse(saved) : null;
          return (parsed && parsed.apiKey) ? parsed : env.config;
        } catch (e) {
          return env.config;
        }
      });
      const [db, setDb] = useState(null);
      const [status, setStatus] = useState('loading');
      const [error, setError] = useState('');
      const [currentDate, setCurrentDate] = useState(() => new Date());
      const [reservations, setReservations] = useState({});
      const [schoolInfo, setSchoolInfo] = useState({ id: schoolId, name: schoolNameFromUrl || DEFAULT_SCHOOL_NAME });
      const [updatedText, setUpdatedText] = useState('');

      useEffect(() => {
        if (!fbConfig || !fbConfig.apiKey || !window.firebase) {
          setStatus('config');
          return;
        }
        try {
          const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(fbConfig);
          const auth = firebase.auth();
          const firestore = firebase.firestore();
          setDb(firestore);

          (async () => {
            try {
              if (env.token) {
                await auth.signInWithCustomToken(env.token);
              } else if (!auth.currentUser) {
                await auth.signInAnonymously();
              }
            } catch (e) {
              console.error(e);
            }
          })();

          const unsubscribeAuth = auth.onAuthStateChanged((user) => {
            if (user || env.token) setStatus('ready');
          });

          return () => unsubscribeAuth();
        } catch (e) {
          console.error(e);
          setError('Firebaseの初期化に失敗しました。');
          setStatus('error');
        }
      }, [fbConfig]);

      useEffect(() => {
        if (!db || status === 'config') return;

        const schoolDocPath = `artifacts/${env.appId}/public/data/schools/${schoolId}`;
        const reservationPath = `${schoolDocPath}/reservations`;

        const unsubscribeSchool = db.doc(schoolDocPath).onSnapshot((doc) => {
          if (doc.exists) {
            const data = doc.data();
            setSchoolInfo({ id: data.id || schoolId, name: data.name || schoolNameFromUrl || DEFAULT_SCHOOL_NAME });
          } else {
            setSchoolInfo({ id: schoolId, name: schoolNameFromUrl || DEFAULT_SCHOOL_NAME });
          }
        });

        const unsubscribeReservations = db.collection(reservationPath).onSnapshot((snapshot) => {
          const next = {};
          let latest = null;
          snapshot.forEach((doc) => {
            const data = doc.data();
            next[doc.id] = data;
            if (data?.updatedAt?.toDate) {
              const dt = data.updatedAt.toDate();
              if (!latest || dt > latest) latest = dt;
            }
          });
          setReservations(next);
          setUpdatedText(latest ? latest.toLocaleString('ja-JP') : '');
          setError('');
        }, (err) => {
          console.error(err);
          if (err.code === 'permission-denied') {
            setError('閲覧権限がありません。Firestoreルールで read を許可してください。');
          } else {
            setError('予約データの読み込みに失敗しました。');
          }
        });

        return () => {
          unsubscribeSchool();
          unsubscribeReservations();
        };
      }, [db, status]);

      const timeSlots = useMemo(() => {
        const slots = [];
        for (let h = 9; h <= 20; h++) {
          slots.push(`${String(h).padStart(2, '0')}:00`, `${String(h).padStart(2, '0')}:30`);
        }
        return slots;
      }, []);

      const weekDays = useMemo(() => {
        const base = new Date(currentDate);
        base.setHours(0,0,0,0);
        const arr = [];
        for (let i = 0; i < 7; i++) {
          const d = new Date(base);
          d.setDate(base.getDate() + i);
          arr.push(d);
        }
        return arr;
      }, [currentDate]);

      const moveWeek = (offset) => {
        const next = new Date(currentDate);
        next.setDate(currentDate.getDate() + offset * 7);
        setCurrentDate(next);
      };

      const getCellState = (date, time) => {
        const key = `${formatYmd(date)}-${time}`;
        const item = reservations[key];
        const state = item?.status || 'available';
        return {
          key,
          state,
          label: state === 'available' ? '空き' : '予約済み'
        };
      };

      if (status === 'config') {
        return (
          <div className="min-h-screen flex items-center justify-center p-6">
            <div className="max-w-xl w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
              <h1 className="text-2xl font-black text-slate-800 mb-4">Firebase設定が必要です</h1>
              <p className="text-sm text-slate-600 leading-7 mb-5">
                まず admin.html で Firebase 設定JSONを保存してください。保存後は reserve.html でも同じ設定が自動で使われます。
              </p>
              <p className="text-xs text-slate-500 bg-slate-50 rounded-2xl p-4">
                同じブラウザで admin.html を開いて設定済みなら、このページを再読み込みしてください。
              </p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gradient-to-b from-indigo-50 via-white to-slate-50">
          <header className="border-b border-indigo-100 bg-white/90 backdrop-blur sticky top-0 z-30">
            <div className="max-w-6xl mx-auto px-4 py-4 md:px-6 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
              <div>
                <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-50 text-emerald-700 text-xs font-bold border border-emerald-100">
                  <Icon className="w-4 h-4"><path d="M20 6 9 17l-5-5" /></Icon>
                  閲覧専用
                </div>
                <h1 className="mt-3 text-2xl md:text-3xl font-black tracking-tight text-slate-800">{schoolInfo.name} 予約状況</h1>
                <p className="mt-2 text-sm text-slate-500">LINEからいつでも最新の空き状況をご確認いただけます。</p>
              </div>
              <div className="bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-xs text-slate-600">
                <div><span className="font-bold">教室ID:</span> {schoolInfo.id}</div>
                {updatedText && <div className="mt-1"><span className="font-bold">最終更新:</span> {updatedText}</div>}
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-6 md:px-6 space-y-5">
            <section className="bg-white rounded-3xl border border-slate-100 shadow-sm p-4 md:p-5">
              <div className="flex flex-wrap gap-3 text-sm">
                <div className="inline-flex items-center gap-2 px-3 py-2 rounded-2xl bg-emerald-50 text-emerald-700 border border-emerald-100 font-bold">
                  <span className="w-3 h-3 rounded-full bg-emerald-500 inline-block"></span> 空き
                </div>
                <div className="inline-flex items-center gap-2 px-3 py-2 rounded-2xl bg-rose-50 text-rose-700 border border-rose-100 font-bold">
                  <span className="w-3 h-3 rounded-full bg-rose-500 inline-block"></span> 予約済み
                </div>
                <div className="inline-flex items-center gap-2 px-3 py-2 rounded-2xl bg-slate-50 text-slate-600 border border-slate-200">
                  表示範囲は1週間ごとです
                </div>
              </div>
              {error && (
                <div className="mt-4 rounded-2xl border border-red-100 bg-red-50 text-red-700 px-4 py-3 text-sm font-bold">
                  {error}
                </div>
              )}
            </section>

            <section className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
              <div className="flex items-center justify-center md:justify-start gap-2">
                <button onClick={() => moveWeek(-1)} className="p-3 rounded-2xl bg-white border border-slate-200 shadow-sm hover:bg-slate-50">
                  <Icon className="w-5 h-5"><path d="m15 18-6-6 6-6" /></Icon>
                </button>
                <div className="min-w-[220px] text-center bg-white border border-slate-200 shadow-sm rounded-2xl px-6 py-3 text-lg font-black text-slate-700">
                  {currentDate.getFullYear()}年{String(currentDate.getMonth() + 1).padStart(2, '0')}月
                </div>
                <button onClick={() => moveWeek(1)} className="p-3 rounded-2xl bg-white border border-slate-200 shadow-sm hover:bg-slate-50">
                  <Icon className="w-5 h-5"><path d="m9 18 6-6-6-6" /></Icon>
                </button>
              </div>
            </section>

            <section className="bg-white rounded-[2rem] border border-slate-100 shadow-xl overflow-hidden">
              <div className="overflow-x-auto custom-scrollbar">
                <table className="w-full border-collapse text-sm">
                  <thead>
                    <tr className="bg-slate-50">
                      <th className="sticky left-0 z-20 bg-white border-b border-r border-slate-200 p-3 min-w-[88px] text-slate-500 text-xs uppercase">Time</th>
                      {weekDays.map((date) => {
                        const day = ['日','月','火','水','木','金','土'][date.getDay()];
                        const dayColor = date.getDay() === 0 ? 'text-rose-500' : date.getDay() === 6 ? 'text-indigo-500' : 'text-slate-500';
                        return (
                          <th key={date.toISOString()} className="border-b border-slate-200 p-3 min-w-[110px] text-center">
                            <div className="text-lg font-black text-slate-800">{date.getDate()}</div>
                            <div className={`text-xs font-bold mt-1 ${dayColor}`}>{day}</div>
                          </th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody>
                    {timeSlots.map((time) => (
                      <tr key={time}>
                        <td className="sticky left-0 z-10 bg-white border-r border-b border-slate-200 p-3 text-center text-xs font-bold text-slate-500">{time}</td>
                        {weekDays.map((date) => {
                          const cell = getCellState(date, time);
                          const available = cell.state === 'available';
                          return (
                            <td key={cell.key} className="border-b border-r border-slate-200 p-2">
                              <div className={`h-12 rounded-2xl flex items-center justify-center font-black text-xs ${available ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-rose-50 text-rose-700 border border-rose-100'}`}>
                                {available ? '空き' : '予約済み'}
                              </div>
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </section>

            <section className="bg-white rounded-3xl border border-slate-100 shadow-sm p-5 text-sm text-slate-600 leading-7">
              <h2 className="text-base font-black text-slate-800 mb-2">ご案内</h2>
              <p>ご希望の時間帯がありましたら、LINE公式アカウントからご連絡ください。予約状況は随時更新していますが、行き違いが生じる場合があります。</p>
            </section>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
